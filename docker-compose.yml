version: "3.9"

services:
  deep-agents:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./deepagentsdemo/projects:/app/deepagentsdemo/projects
      - ./deepagentsdemo/skills:/app/deepagentsdemo/skills
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
